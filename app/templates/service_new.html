{% extends "base.html" %}
{% block title %}New Service{% endblock %}
{% block content %}
  <h1>Create a Service</h1>

  <form method="POST">
    <label>Title</label><br />
    <input name="title" type="text" required /><br /><br />

    <label>Description (optional)</label><br />
    <textarea name="description" rows="5" cols="60"></textarea><br /><br />

    <label>Price (optional)</label><br />
    <input name="price" type="number" step="0.01" min="0" /><br /><br />

    <button class="btn" type="submit">Create</button>
  </form>
{% endblock %}

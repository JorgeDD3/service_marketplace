{% extends "base.html" %}

{% block title %}Create Account{% endblock %}

{% block content %}
<div class="container py-3 py-md-4" style="max-width: 920px;">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-7">

      <div class="text-center mb-3">
        <h1 class="h4 mb-1">Create your account</h1>
        <p class="text-muted mb-0">Join as a client or provider.</p>
      </div>

      <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-3 p-md-4">

          <form method="POST" action="{{ url_for('auth.register') }}" novalidate>
            <div class="row g-2">
              <div class="col-md-6">
                <label class="form-label mb-1">First name</label>
                <input
                  type="text"
                  class="form-control"
                  name="first_name"
                  autocomplete="given-name"
                  required
                  autofocus
                >
              </div>

              <div class="col-md-6">
                <label class="form-label mb-1">Last name</label>
                <input
                  type="text"
                  class="form-control"
                  name="last_name"
                  autocomplete="family-name"
                  required
                >
              </div>

              <div class="col-12 mt-2">
                <label class="form-label mb-1">Email</label>
                <input
                  type="email"
                  class="form-control"
                  name="email"
                  autocomplete="email"
                  placeholder="you@example.com"
                  required
                >
              </div>

              <div class="col-md-6 mt-2">
                <label class="form-label mb-1">Password</label>
                <input
                  type="password"
                  class="form-control"
                  name="password"
                  autocomplete="new-password"
                  minlength="8"
                  required
                >
              </div>

              <div class="col-md-6 mt-2">
                <label class="form-label mb-1">Confirm password</label>
                <input
                  type="password"
                  class="form-control"
                  name="confirm_password"
                  autocomplete="new-password"
                  minlength="8"
                  required
                >
              </div>

              <div class="col-12 mt-2">
                <label class="form-label mb-1">Account type</label>
                <select class="form-select" name="role" required>
                  <option value="" selected disabled>Select…</option>
                  <option value="client">Client (book services)</option>
                  <option value="provider">Provider (offer services)</option>
                </select>
                <div class="form-text mt-1">
                  Providers can create a profile, list services, and manage availability.
                </div>
              </div>

              <div class="col-12 d-grid mt-2">
                <button type="submit" class="btn btn-primary btn-lg rounded-3">
                  Create account
                </button>
              </div>

              <div class="col-12 text-center mt-2">
                <span class="text-muted">Already have an account?</span>
                <a href="{{ url_for('auth.login') }}" class="text-decoration-none ms-1">Log in</a>
              </div>
            </div>
          </form>

        </div>
      </div>

    </div>
  </div>
</div>
{% endblock %}

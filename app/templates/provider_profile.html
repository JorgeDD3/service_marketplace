{% extends "base.html" %}
{% block title %}Provider Profile{% endblock %}

{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="mb-0">Provider Profile</h1>

    {% if profile and profile.verification %}
      <span class="badge
        {% if profile.verification.status == 'verified' %} text-bg-success
        {% elif profile.verification.status == 'pending_review' %} text-bg-warning
        {% elif profile.verification.status == 'rejected' %} text-bg-danger
        {% else %} text-bg-secondary
        {% endif %}
      ">
        {{ profile.verification.status.replace('_', ' ') }}
      </span>
    {% else %}
      <span class="badge text-bg-secondary">unverified</span>
    {% endif %}
  </div>

  <div class="mb-4">
    <a class="btn btn-outline-primary btn-sm" href="{{ url_for('provider.verification') }}">
      Manage Verification
    </a>
  </div>

  <form method="POST">
    <label class="form-label">Bio</label><br />
    <textarea class="form-control" name="bio" rows="5" required>{{ profile.bio if profile else "" }}</textarea>
    <br />

    <label class="form-label">Hourly Rate (optional)</label><br />
    <input class="form-control" name="hourly_rate" type="number" step="0.01" min="0"
           value="{{ profile.hourly_rate if profile and profile.hourly_rate is not none else '' }}" />
    <br />

    <label class="form-label">Availability Notes (optional)</label><br />
    <textarea class="form-control" name="availability_notes" rows="4">{{ profile.availability_notes if profile and profile.availability_notes else "" }}</textarea>
    <br />

    <button class="btn btn-primary" type="submit">Save</button>
  </form>
{% endblock %}
